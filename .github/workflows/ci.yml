name: CI Pipeline

# Trigger the pipeline on push and pull requests to target branches
on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8==6.1.0 black==23.9.1 isort==5.12.0 pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Check code formatting with Black
      run: black --check .

    - name: Lint with Flake8
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run Tests with Coverage
      env:
        DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      run: |
        if [ -d "tests" ]; then
          python -m pytest --cov=app --cov=cli --cov-report=xml tests/
        else
          echo "No tests found. Skipping."
        fi

    - name: Validate Docker Compose
      run: |
        if [ -f docker-compose.yml ]; then
          docker compose up -d
          docker compose down
        else
          echo "docker-compose.yml not found yet. Skipping."
        fi
