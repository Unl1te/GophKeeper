<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GophKeeper Web Client</title>
    <style>
        body { font-family: sans-serif; margin: 2em; background: #1e1e2e; color: #cdd6f4; }
        input, select, button { margin: 0.3em; padding: 0.5em; border-radius: 4px; border: none; }
        button { background: #89b4fa; color: #1e1e2e; cursor: pointer; font-weight: bold; }
        button:hover { background: #b4befe; }
        .container { max-width: 900px; margin: 0 auto; background: #313244; padding: 2em; border-radius: 8px; }
        .section { border-top: 1px solid #45475a; margin-top: 1em; padding-top: 1em; }
        .output { background: #1e1e2e; padding: 1em; border-radius: 4px; white-space: pre-wrap; font-family: monospace; max-height: 300px; overflow-y: auto; }
        .flex { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5em; }
        .token { background: #45475a; padding: 0.2em 0.6em; border-radius: 4px; font-size: 0.8em; word-break: break-all; }
        .error { color: #f38ba8; }
        .success { color: #a6e3a1; }
        h1, h2, h3 { margin: 0.5em 0; }
        .inline-block { display: inline-block; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔐 GophKeeper Web Client</h1>
    <p><em>Same API as CLI – no changes to CLI needed.</em></p>

    <!-- Auth -->
    <div class="section">
        <h2>Authentication</h2>
        <div class="flex">
            <input id="loginInput" placeholder="login" value="testuser">
            <input id="passwordInput" type="password" placeholder="password" value="secret123">
            <button id="registerBtn">Register</button>
            <button id="loginBtn">Login</button>
            <button id="logoutBtn">Logout</button>
        </div>
        <div id="authStatus" class="output">Not logged in</div>
    </div>

    <!-- Items -->
    <div class="section">
        <h2>Items</h2>
        <div class="flex">
            <select id="itemType">
                <option value="text">text</option>
                <option value="password">password</option>
                <option value="card">card</option>
                <option value="binary">binary</option>
            </select>
            <input id="itemContent" placeholder="content (text or base64 for binary)" style="flex:1;">
            <input id="itemMeta" placeholder='metadata {"key":"value"}' value='{"note":"test"}'>
            <button id="createItemBtn">Create</button>
        </div>
        <div class="flex">
            <input id="itemId" placeholder="item id" style="width:80px;">
            <button id="getItemBtn">Get</button>
            <button id="listItemsBtn">List</button>
            <button id="deleteItemBtn">Delete</button>
        </div>
        <div class="flex">
            <input id="updateId" placeholder="id" style="width:80px;">
            <input id="updateContent" placeholder="new content">
            <input id="updateVersion" placeholder="version" style="width:60px;">
            <button id="updateItemBtn">Update</button>
        </div>
        <div id="itemsOutput" class="output">No items loaded</div>
    </div>

    <!-- Sync -->
    <div class="section">
        <h2>Sync</h2>
        <button id="syncBtn">Sync (POST /items/sync)</button>
        <div id="syncOutput" class="output">Sync result</div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
