<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GophKeeper Web Client</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 2em;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    input, select, button {
      margin: 0.3em;
      padding: 0.5em;
      border-radius: 4px;
      border: none;
    }
    button {
      background: #89b4fa;
      color: #1e1e2e;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #b4befe; }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #313244;
      padding: 2em;
      border-radius: 8px;
    }
    .section {
      border-top: 1px solid #45475a;
      margin-top: 1em;
      padding-top: 1em;
    }
    .output {
      background: #1e1e2e;
      padding: 1em;
      border-radius: 4px;
      white-space: pre-wrap;
      font-family: monospace;
      max-height: 300px;
      overflow-y: auto;
    }
    .flex {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5em;
    }
    .token {
      background: #45475a;
      padding: 0.2em 0.6em;
      border-radius: 4px;
      font-size: 0.8em;
      word-break: break-all;
    }
    h1, h2, h3 { margin: 0.5em 0; }
  </style>
</head>
<body>
<div class="container">
  <h1>GophKeeper Web Client</h1>
  <p><em>Same functionality as CLI – encryption/decryption in the browser.</em></p>

  <!-- Auth -->
  <div class="section">
    <h2>Authentication</h2>
    <div class="flex">
      <input id="loginInput" placeholder="login" value="demo" />
      <input id="passwordInput" type="password" placeholder="password" value="demo123" />
      <button id="registerBtn">Register</button>
      <button id="loginBtn">Login</button>
      <button id="logoutBtn">Logout</button>
    </div>
    <div id="authStatus" class="output">Not logged in</div>
  </div>

  <!-- Items -->
  <div class="section">
    <h2>Items</h2>
    <div class="flex">
      <select id="itemType">
        <option value="text">text</option>
        <option value="password">password</option>
        <option value="card">card</option>
        <option value="binary">binary</option>
      </select>
      <input id="itemContent" placeholder="content" style="flex:1;" />
      <input id="itemMeta" placeholder='metadata {"key":"value"}' value='{"note":"demo"}' />
      <button id="createItemBtn">Create</button>
    </div>
    <div class="flex">
      <input id="itemId" placeholder="item id" style="width:80px;" />
      <button id="getItemBtn">Get (decrypt)</button>
      <button id="listItemsBtn">List</button>
      <button id="deleteItemBtn">Delete</button>
    </div>
    <div id="itemsOutput" class="output">No items loaded</div>
  </div>
</div>

<!-- Load argon2-browser as a classic script (global object) -->
<script src="https://cdn.jsdelivr.net/npm/argon2-browser@1.18.0/dist/argon2.min.js"></script>

<!-- Our main module (will use the global argon2) -->
<script type="module" src="app.js"></script>
</body>
</html>
