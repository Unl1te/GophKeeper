[flake8]
max-line-length = 120

# ignore long lines (E501) because black formats code to 88 characters by default, and we don't want to fight with it
ignore = E501


per-file-ignores =
    **/__init__.py: F401
    app/models/models.py: F401
    app/schemas/__init__.py: F401
    app/core/security.py: F401

exclude = .git,__pycache__,env,venv

[isort]
profile = black
